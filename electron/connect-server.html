<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dropsoft HR — Server address</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, Segoe UI, sans-serif;
      margin: 0;
      padding: 20px 22px 28px;
      color: #111;
      line-height: 1.45;
      background: #f6f7f9;
    }
    h1 { font-size: 1.1rem; margin: 0 0 8px; }
    p { margin: 0 0 14px; font-size: 13px; color: #333; }
    label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; }
    input[type="url"],
    input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    input:focus { outline: 2px solid #2563eb; outline-offset: 1px; border-color: #2563eb; }
    .actions { margin-top: 18px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    button.secondary {
      background: #e5e7eb;
      color: #111827;
    }
    button.secondary:hover { background: #d1d5db; }
    button {
      padding: 10px 18px;
      font-size: 14px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      background: #2563eb;
      color: #fff;
      font-weight: 600;
    }
    button:hover { background: #1d4ed8; }
    button:disabled { opacity: 0.55; cursor: not-allowed; }
    .err { color: #b91c1c; font-size: 13px; margin-top: 10px; }
    .ok { color: #15803d; font-size: 13px; margin-top: 10px; }
    code { font-size: 12px; background: #eee; padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>Connect to central HR server</h1>
  <p>
    This PC will run Dropsoft HR as a <strong>client</strong> (no local database). Enter the address of the computer
    where the HR server is running, including port — for example <code>http://192.168.1.10:32100</code>
  </p>
  <form id="f">
    <label for="url">Server URL</label>
    <input id="url" name="url" type="text" placeholder="http://192.168.1.10:32100" autocomplete="off" />
    <div class="actions">
      <button type="submit" id="btn">Save</button>
      <button type="button" id="testBtn" class="secondary">Test connection</button>
    </div>
    <div id="msg"></div>
  </form>
  <p style="margin-top: 18px; font-size: 12px; color: #555;">
    Settings are saved to: <code id="path">…</code>
  </p>
  <script>
    const form = document.getElementById('f')
    const input = document.getElementById('url')
    const msg = document.getElementById('msg')
    const btn = document.getElementById('btn')
    const testBtn = document.getElementById('testBtn')
    const pathEl = document.getElementById('path')
    ;(async () => {
      try {
        const p = await window.connectApi.getConfigPath()
        pathEl.textContent = p || '(unknown)'
      } catch (e) {
        pathEl.textContent = String(e)
      }
    })()
    form.addEventListener('submit', async (e) => {
      e.preventDefault()
      msg.textContent = ''
      msg.className = ''
      btn.disabled = true
      testBtn.disabled = true
      try {
        const r = await window.connectApi.saveRemoteApi(input.value.trim())
        if (r.ok) {
          msg.className = 'ok'
          msg.textContent =
            'Saved. Close this window and start Dropsoft HR again (without --set-server). The app will connect to ' +
            r.baseUrl +
            '.'
        } else {
          msg.className = 'err'
          msg.textContent = r.error || 'Could not save.'
        }
      } catch (err) {
        msg.className = 'err'
        msg.textContent = err && err.message ? err.message : String(err)
      } finally {
        btn.disabled = false
        testBtn.disabled = false
      }
    })
    testBtn.addEventListener('click', async () => {
      msg.textContent = ''
      msg.className = ''
      btn.disabled = true
      testBtn.disabled = true
      try {
        const r = await window.connectApi.testRemoteApi(input.value.trim())
        if (r.ok) {
          msg.className = 'ok'
          msg.textContent = 'Connection OK. You can save this server URL.'
        } else {
          msg.className = 'err'
          msg.textContent = r.error || 'Could not reach the server.'
        }
      } catch (err) {
        msg.className = 'err'
        msg.textContent = err && err.message ? err.message : String(err)
      } finally {
        btn.disabled = false
        testBtn.disabled = false
      }
    })
  </script>
</body>
</html>
